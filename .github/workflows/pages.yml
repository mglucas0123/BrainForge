# Publishes bf.ps1 → https://mglucas0123.github.io/BrainForge/bf.ps1
name: Pages

on:
  push:
    branches: [main]
    paths:
      - "bf.ps1"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Required when enablement: true (first-time Pages setup)
  administration: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare docs
        run: |
          mkdir -p docs
          cp bf.ps1 docs/bf.ps1

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deployment
